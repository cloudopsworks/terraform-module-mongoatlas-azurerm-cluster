# Module configuration for MongoDB Atlas Cluster with Azure Integration

# (Required) Azure region for resource naming and deployment.
# Example: "eastus2", "westus2", "northeurope"
region: "eastus2"

# (Required) Unique identifier prefix for resources.
name_prefix: "mdb"

# (Required) Name of the MongoDB Atlas cluster.
name: "production-cluster"

# (Optional) The ID of the Atlas project where the cluster will be created.
# If not provided, must be set via environment or other means.
project_id: ""

# (Optional) The name of the Atlas project where the cluster will be created.
# Used for tagging and identification purposes.
project_name: ""

# (Optional) Default cloud provider for Atlas backup export bucket and copy settings.
# Valid values: AWS | GCP | AZURE
# Default: "AZURE"
cloud_provider: "AZURE"

# (Optional) Run hoop with agent. Be careful — this executes the HOOP command via a null_resource.
# Default: false
run_hoop: false

# (Required) Module settings object containing all cluster configuration.
# All nested attributes follow YAML structure as documented below.
settings:
  # (Optional) Cluster deployment type.
  # Valid values: REPLICASET | SHARDED | GEOSHARDED
  # Default: "REPLICASET"
  cluster_type: "REPLICASET"

  # (Optional) MongoDB major version to deploy.
  # Default: null (uses Atlas default)
  major_version: 7.0

  # (Optional) Enable cluster termination protection.
  # Default: null (disabled)
  termination_protection: true

  # (Optional) Version release type for MongoDB updates.
  # Valid values: LTS | CONTINUOUS
  # Default: "LTS"
  version_release: "LTS"

  # (Optional) Enable encryption at rest for cluster data.
  # Default: false
  encryption_at_rest_enabled: false

  # (Optional) Cloud provider for encryption at rest.
  # This module defaults to "AZURE" when enabled.
  # Valid values: AWS | GCP | AZURE
  encryption_at_rest_provider: "AZURE"

  # (Optional) Default cloud provider override for backup export/copy within settings.
  # Valid values: AWS | GCP | AZURE
  # Default: inherits from var.cloud_provider ("AZURE")
  cloud_provider: "AZURE"

  # (Optional) BI Connector configuration.
  bi_connector:
    # (Optional) Enable BI Connector for MongoDB.
    # Default: false
    enabled: false

    # (Optional) Read preference for BI Connector queries.
    # Valid values: primary | secondary | primaryPreferred | secondaryPreferred | nearest
    # Default: "secondary"
    read_preference: "secondary"

  # (Optional) Atlas admin user configuration with Azure Key Vault integration.
  admin_user:
    # (Optional) Create an Atlas admin user and store credentials in Key Vault.
    # Default: false
    enabled: false

    # (Optional) Username for the admin user.
    # Default: auto-generated if not specified
    username: "admin"

    # (Optional) Authentication database for the admin user.
    # Default: "admin"
    auth_database: "admin"

    # (Required when enabled) Name of the Azure Key Vault to store credentials.
    key_vault_name: "my-kv"

    # (Required when enabled) Resource group containing the Key Vault.
    key_vault_resource_group: "my-rg"

    # (Optional) When true, an external rotation manager handles the password.
    # Default: false
    use_external_rotation: false

    # (Optional) External rotator identifier (e.g. Lambda name for AWS).
    # Required when use_external_rotation is true.
    rotation_lambda_name: ""

    # (Optional) Password rotation period in days.
    # Default: 90
    rotation_period: 90

    # (Optional) Duration allowed for external rotator execution.
    # Default: "1h"
    rotation_duration: "1h"

    # (Optional) Password rotation period in days managed by Terraform time_rotating.
    # Default: 90
    password_rotation_period: 90

  # (Optional) Advanced MongoDB configuration options.
  advanced:
    # (Optional) Default write concern for the cluster.
    # Default: null
    default_write_concern: "majority"

    # (Optional) Enable JavaScript execution on the cluster.
    # Default: null
    javascript: false

    # (Optional) TLS protocol version for client connections.
    # Valid values: TLS1_0 | TLS1_1 | TLS1_2 | TLS1_3
    # Default: null
    tls_protocol: "TLS1_2"

    # (Optional) Disable table scans for all databases.
    # Default: null
    no_table_scan: false

    # (Optional) Oplog size in megabytes.
    # Default: null
    oplog_size: 50

    # (Optional) Oplog retention period in hours.
    # Default: null
    oplog_retention: 30

    # (Optional) BI Connector advanced settings.
    bi:
      # (Optional) Sample size for BI Connector schema refresh.
      # Default: null
      sample_size: 1000

      # (Optional) Refresh interval in seconds for BI Connector.
      # Default: null
      refresh_interval: 60

    # (Optional) Transaction lifetime limit in minutes.
    # Default: null
    transaction_lifetime: 30

  # (Optional) Cloud backup (Cloud Backups) configuration.
  backup:
    # (Optional) Enable cloud backup for the cluster.
    # Default: false
    enabled: false

    # (Optional) Hour of day (0-23) when backup window starts.
    # Default: 0
    hour_of_day: 2

    # (Optional) Minute of hour (0-59) when backup window starts.
    # Default: 0
    minute_of_hour: 0

    # (Optional) Number of days for point-in-time restore window.
    # Default: 1
    restore_window_days: 7

    # (Optional) Enable automatic export of backups.
    # Default: false
    auto_export: false

    # (Optional) Prefix for exported backup file names.
    # Default: null
    export_prefix: ""

    # (Optional) Hourly backup retention policy.
    hourly:
      # (Optional) Frequency between hourly snapshots in hours.
      # Default: 1
      interval: 6

      # (Optional) Retention unit for hourly snapshots.
      # Fixed to "days" for hourly.
      retention_unit: "days"

      # (Optional) Number of units to retain hourly snapshots.
      # Default: 1
      retention_value: 2

    # (Optional) Daily backup retention policy.
    daily:
      # (Optional) Frequency between daily snapshots in days.
      # Default: 1
      interval: 1

      # (Optional) Retention unit for daily snapshots.
      # Fixed to "days" for daily.
      retention_unit: "days"

      # (Optional) Number of days to retain daily snapshots.
      # Default: 7
      retention_value: 7

    # (Optional) Weekly backup retention policy.
    weekly:
      # (Optional) Day of week (1-7) for weekly snapshots.
      # Default: 1
      interval: 1

      # (Optional) Retention unit for weekly snapshots.
      # Fixed to "weeks" for weekly.
      retention_unit: "weeks"

      # (Optional) Number of weeks to retain weekly snapshots.
      # Default: 4
      retention_value: 4

    # (Optional) Monthly backup retention policy.
    monthly:
      # (Optional) Day of month (1-28) for monthly snapshots.
      # Default: 1
      interval: 1

      # (Optional) Retention unit for monthly snapshots.
      # Fixed to "months" for monthly.
      retention_unit: "months"

      # (Optional) Number of months to retain monthly snapshots.
      # Default: 12
      retention_value: 12

    # (Optional) Yearly backup retention policy.
    yearly:
      # (Optional) Month of year (1-12) for yearly snapshots.
      # Default: 1
      interval: 1

      # (Optional) Retention unit for yearly snapshots.
      # Fixed to "years" for yearly.
      retention_unit: "years"

      # (Optional) Number of years to retain yearly snapshots.
      # Default: 2
      retention_value: 2

    # (Optional) Export configuration for backup data.
    export:
      # (Optional) Override cloud provider for this export bucket.
      # Valid values: AWS | GCP | AZURE
      # Default: settings.cloud_provider ("AZURE")
      cloud_provider: "AZURE"

      # (Required for AWS) S3 bucket name for the export destination.
      bucket_name: ""

      # (Required for AWS) IAM role ID (assumed role) for bucket access.
      iam_role_id: ""

      # (Required for GCP/AZURE) Service URL for the export bucket.
      # Example: "https://myaccount.blob.core.windows.net/mycontainer"
      service_url: "https://..."

      # (Required for GCP/AZURE) Role ID for bucket access.
      role_id: "role-id"

      # (Optional) Frequency type for exported snapshots.
      # Valid values: HOURLY | DAILY | WEEKLY | MONTHLY | YEARLY
      # Default: "DAILY"
      frecuency_type: "DAILY"

    # (Optional) Cross-region copy settings for backup snapshots.
    copy:
      # (Optional) Override cloud provider for copy settings.
      # Valid values: AWS | GCP | AZURE
      # Default: settings.cloud_provider ("AZURE")
      cloud_provider: "AZURE"

      # (Optional) List of snapshot frequency types to include in copy.
      # Example: ["DAILY", "WEEKLY"]
      frequencies: []

      # (Optional) Target Atlas region name for the copy destination.
      # Default: deployment region converted to Atlas format
      region_name: "US_EAST_2"

      # (Optional) Include oplogs in the copied snapshot.
      # Default: false
      copy_oplogs: false

  # (Optional) Global cluster zone configuration (used for GEOSHARDED clusters).
  global:
    # (Optional) Zone name for the primary replication spec.
    # Default: null
    zone_name: "Zone 1"

  # (Optional) List of region configurations for the primary replication spec.
  # Azure Atlas region names must be set explicitly — they do NOT match Azure region names.
  # Example: Azure "eastus2" -> Atlas "US_EAST_2"
  regions:
    - # (Optional) Backing cloud provider for TENANT clusters.
      # Valid values: AWS | GCP | AZURE
      # Default: null
      backing_provider: "AZURE"

      # (Optional) Primary cloud provider type for this region.
      # Valid values: TENANT | AWS | GCP | AZURE
      # Default: "TENANT"
      provider: "AZURE"

      # (Required for AZURE) Atlas region name in uppercase underscore format.
      # This MUST be set explicitly - var.region is NOT auto-converted.
      # Common Azure regions: US_EAST_2, US_WEST, EUROPE_NORTH, EUROPE_WEST
      # See full list: https://www.mongodb.com/docs/atlas/reference/microsoft-azure/
      region: "US_EAST_2"

      # (Optional) Electable node priority (1-7, higher = more likely to be primary).
      # Default: 7
      priority: 7

      # (Optional) Electable node pool configuration.
      electable:
        # (Optional) Instance size for electable nodes.
        # Default: "M2"
        size: "M10"

        # (Optional) Number of electable nodes.
        # Default: null
        count: 3

        # (Optional) Disk size in GB, set at spec level (required by provider v2.0+).
        # Default: null
        disk_size: 10

      # (Optional) Analytics node pool configuration.
      analytics:
        # (Optional) Instance size for analytics nodes.
        # Default: "M2"
        size: "M10"

        # (Optional) Number of analytics nodes.
        # Default: null
        count: 1

        # (Optional) Disk size in GB for analytics nodes.
        # Default: null
        disk_size: 10

      # (Optional) Read-only node pool configuration.
      read_only:
        # (Optional) Instance size for read-only nodes.
        # Default: "M2"
        size: "M10"

        # (Optional) Number of read-only nodes.
        # Default: null
        count: 0

        # (Optional) Disk size in GB for read-only nodes.
        # Default: null
        disk_size: 10

      # (Optional) Auto-scaling configuration for electable nodes.
      auto_scaling:
        # (Optional) Enable automatic disk size scaling.
        # Default: false
        disk: false

        # (Optional) Enable automatic compute instance scaling.
        # Default: false
        compute: false

        # (Optional) Maximum instance size for compute auto-scaling.
        # Default: null
        max_size: "M40"

        # (Optional) Minimum instance size for compute auto-scaling.
        # Default: null
        min_size: "M10"

        # (Optional) Allow scale-down when load decreases.
        # Default: false
        scale_down: false

        # (Optional) Auto-scaling settings for analytics nodes.
        analytics:
          # (Optional) Enable disk auto-scaling for analytics nodes.
          # Default: false
          disk: false

          # (Optional) Enable compute auto-scaling for analytics nodes.
          # Default: false
          compute: false

          # (Optional) Maximum instance size for analytics auto-scaling.
          # Default: null
          max_size: "M40"

          # (Optional) Minimum instance size for analytics auto-scaling.
          # Default: null
          min_size: "M10"

          # (Optional) Allow scale-down for analytics nodes.
          # Default: false
          scale_down: false

  # (Optional) Additional shards for SHARDED / GEOSHARDED clusters.
  # Each entry creates one additional replication_specs element (provider v2.0 independent shard scaling).
  # Default: []
  shards:
    - # (Optional) Zone name for this shard (required for GEOSHARDED clusters).
      # Default: null
      zone_name: "zone-1"

      # (Optional) Region configurations for this shard.
      # Same structure as settings.regions above.
      regions:
        - provider: "AZURE"
          backing_provider: "AZURE"
          region: "EUROPE_WEST"
          priority: 7
          electable:
            size: "M30"
            count: 3
            disk_size: 10

  # (Optional) HOOP agent integration configuration.
  hoop:
    # (Optional) Enable HOOP agent integration for cluster access.
    # Default: false
    enabled: false

    # (Optional) HOOP agent name to associate with this cluster.
    # Default: null
    agent: "hoop-agent-name"

    # (Optional) List of tags to apply to the HOOP connection.
    # Default: []
    tags: []
